<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LawTamil Mobile Broadcaster</title>
    
    <style>
        /* திரைக்கு வெளியே எதுவும் செல்லாமல் 100% அளவைக் கச்சிதமாகப் பூட்டும் தர்க்கம் */
        html, body {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            overflow: hidden;
            background-color: #000;
            /* Flexbox மூலம் மொபைல் திரைக்குள் கச்சிதமாக அடைத்தல் */
            display: flex;
            flex-direction: column;
        }
        
        #preview-frame {
            /* 100vh-க்கு பதிலாக 100% பயன்படுத்தப்பட்டுள்ளது. இது பட்டன்களை மறைக்காது */
            width: 100%;
            height: 100%;
            flex-grow: 1;
            border: none;
            background-color: #000;
            display: block;
        }
    </style>
</head>

<body>
    
    <iframe id="preview-frame" 
            src="https://webrtc.lawtamil.in/?room=JurisprudenceTamil&push=&miconly&as&hh&ee&label=&mobile&hidetranslate" 
            name="preview-frame" 
            allow="autoplay; microphone; fullscreen; screen-wake-lock;">
    </iframe>

    <script>
        // மொபைல் ஸ்கிரீன் தானாக ஆஃப் ஆவதைத் தடுக்கும் மாஸ்டர் தர்க்கம் (Wake Lock API)
        let wakeLock = null;

        const requestWakeLock = async () => {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('LawTamil Wake Lock Active: திரை அணையாது.');
                    
                    document.addEventListener('visibilitychange', async () => {
                        if (wakeLock !== null && document.visibilityState === 'visible') {
                            wakeLock = await navigator.wakeLock.request('screen');
                        }
                    });
                }
            } catch (err) {
                console.error(`Wake Lock Error: ${err.name}, ${err.message}`);
            }
        };

        window.addEventListener('load', requestWakeLock);
    </script>
</body>
</html>
