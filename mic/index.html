<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LawTamil Mobile Broadcaster</title>
    
    <style>
        html, body {
            width: 100%; height: 100%; padding: 0; margin: 0; overflow: hidden;
            background-color: #000; display: flex; flex-direction: column;
            color: #ffbc59; font-family: sans-serif; text-align: center; justify-content: center;
        }
        
        #preview-frame {
            width: 100%; height: 100%; flex-grow: 1; border: none;
            background-color: #000; display: none; /* ஆரம்பத்தில் Iframe மறைக்கப்பட்டிருக்கும் */
        }

        #loading-text { font-size: 16px; font-weight: bold; }
    </style>
</head>

<body>
    
    <div id="loading-text">மைக்ரோபோன் அனுமதி சரிபார்க்கப்படுகிறது...<br><span style="font-size:12px; color:#aaa;">(தயவுசெய்து Allow கொடுக்கவும்)</span></div>
    
    <iframe id="preview-frame" name="preview-frame" allow="autoplay; microphone; fullscreen; screen-wake-lock;"></iframe>

    <script>
        async function startSecureMic() {
            try {
                // 1. மெயின் பக்கத்தில் (Parent Domain) முதலில் மைக் அனுமதியைக் கேட்பது
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // 2. அனுமதி கிடைத்த அடுத்த நொடி, அந்த மைக்கை விடுவிப்பது (Iframe-க்கு வழிவிட)
                stream.getTracks().forEach(track => track.stop());

                // 3. வாசகத்தை மறைத்துவிட்டு Iframe-ஐ லோட் செய்வது
                document.getElementById('loading-text').style.display = 'none';
                const iframe = document.getElementById('preview-frame');
                iframe.style.display = 'block';
                
                // உங்களின் அசல் லிங்க் (Relative Path)
                iframe.src = "/?room=JurisprudenceTamil&push=&miconly&as&hh&ee&label=&mobile&hidetranslate";

                // Wake Lock API (ஸ்கிரீன் அணையாமல் தடுக்க)
                if ('wakeLock' in navigator) {
                    await navigator.wakeLock.request('screen');
                }
                
            } catch (err) {
                // பயனர் அனுமதி மறுத்தால்...
                document.getElementById('loading-text').innerHTML = "மைக் அனுமதி மறுக்கப்பட்டது!<br>தயவுசெய்து செட்டிங்ஸில் அனுமதியை வழங்கிவிட்டு மீண்டும் முயலவும்.";
                document.getElementById('loading-text').style.color = "red";
            }
        }

        // பக்கம் லோட் ஆனவுடன் முன்-அனுமதி தர்க்கத்தைத் தொடங்குதல்
        window.addEventListener('load', startSecureMic);
    </script>
</body>
</html>
