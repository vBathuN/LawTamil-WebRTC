<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LawTamil Live Studio</title>
    
    <style>
        /* விருந்தினரின் திரையில் பட்டன்கள் கச்சிதமாகத் தெரிய Flexbox தர்க்கம் */
        html, body {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            overflow: hidden;
            background-color: #000;
            display: flex;
            flex-direction: column;
        }
        
        #preview-frame {
            width: 100%;
            height: 100%;
            flex-grow: 1;
            border: none;
            background-color: #000;
            display: block;
        }
    </style>
</head>

<body>
    
    <iframe id="preview-frame" 
            src="/?room=JurisprudenceTamil&push=&miconly&as&hh&ee&label=&mobile&hidetranslate" 
            name="preview-frame" 
            allow="autoplay; microphone; fullscreen; screen-wake-lock;">
    </iframe>

    <script>
        // மொபைல் ஸ்கிரீன் தானாக ஆஃப் ஆவதைத் தடுக்கும் மாஸ்டர் தர்க்கம் (Wake Lock API)
        let wakeLock = null;

        const requestWakeLock = async () => {
            try {
                // பிரவுசரில் WakeLock வசதி உள்ளதா எனச் சரிபார்த்தல்
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('LawTamil Wake Lock Active: விருந்தினரின் திரை அணையாது.');
                    
                    // விருந்தினர் வேறு ஆப்களுக்குச் சென்றுவிட்டுத் திரும்பினால் மீண்டும் லாக் செய்தல்
                    document.addEventListener('visibilitychange', async () => {
                        if (wakeLock !== null && document.visibilityState === 'visible') {
                            wakeLock = await navigator.wakeLock.request('screen');
                        }
                    });
                }
            } catch (err) {
                console.error(`Wake Lock Error: ${err.name}, ${err.message}`);
            }
        };

        // பக்கம் முழுமையாக லோட் ஆனதும் Wake Lock-ஐத் தொடங்குதல்
        window.addEventListener('load', requestWakeLock);
    </script>
</body>
</html>
