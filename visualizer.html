<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>LawTamil Ninja Standalone Visualizer</title>
    <style>
        /* 1. Iframe-க்காக Transparent பின்னணி */
        body { 
            background-color: transparent !important; margin: 0; overflow: hidden; 
            height: 100vh; display: flex; flex-direction: column; justify-content: flex-end; 
        }
        
        /* 2. அசல் OBS Visualizer CSS (ஒரு புள்ளி கூட மாறாமல்) */
        .anim-section { 
            width: 100%; height: 100%; 
            background: url('https://assets.jurisprudencetamil.com/gif/justice.gif') no-repeat center bottom -45px; 
            background-size: contain; position: relative; display: flex; flex-direction: column; justify-content: flex-end; box-sizing: border-box;
        }
        #justice-glow {
            position: absolute; top: 34%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; border-radius: 50%; 
            background: radial-gradient(circle, rgba(255, 215, 0, 0.9) 0%, rgba(255, 215, 0, 0) 50%), radial-gradient(circle, rgba(255, 215, 0, 0.6) 10%, rgba(255, 215, 0, 0) 80%);
            clip-path: circle(50% at 50% 50%); filter: blur(3px); box-shadow: 0 0 25px rgba(255, 215, 0, 0.8); z-index: 5; opacity: 0; pointer-events: none; transition: opacity 0.05s ease-out; 
        }
        #visualizer { position: absolute; top: 34%; left: 50%; transform: translate(-50%, -50%); width: 150px; height: 150px; z-index: 6; pointer-events: none; }
        .v-bar {
            position: absolute; bottom: 50%; left: 50%; width: 4px; height: 6px; background: #ffbc59; 
            border-radius: 2px 2px 0 0; margin-left: -2px; transform-origin: bottom center; box-shadow: 0px 0px 8px rgba(255, 188, 89, 0.9); 
        }

        /* 3. VDO.Ninja எஞ்சினை மறைக்கும் குகை */
        #vdo-engine { position: absolute; width: 10px; height: 10px; opacity: 0.01; pointer-events: none; z-index: -1; }
    </style>
</head>
<body>

    <div class="anim-section">
        <div id="justice-glow"></div> 
        <div id="visualizer"></div>
    </div>
    
    <iframe id="vdo-engine" allow="autoplay"></iframe>

    <script>
        // URL Room தர்க்கம்
        const urlParams = new URLSearchParams(window.location.search);
        const roomName = urlParams.get('room') || 'JurisprudenceTamil';
        document.getElementById('vdo-engine').src = `./index.html?scene&room=${roomName}&autostart`;

        // அசல் Visualizer JS Variables (ஒரு புள்ளி மாறாமல்)
        const ARC_RADIUS = 30; 
        let analyser, dataArray, vBars = []; 
        let audioCtx; 
        
        const vContainer = document.getElementById('visualizer'); 
        const glowDiv = document.getElementById('justice-glow');
        
        // அசல் 50 கட்டங்கள், அரைவட்ட கோணங்கள்
        const numBars = 50; const startAngle = -135; const endAngle = 135; const step = (endAngle - startAngle) / (numBars - 1);
        
        for (let i = 0; i < numBars; i++) {
            const b = document.createElement('div'); b.className = 'v-bar';
            const angle = startAngle + (i * step); b.dataset.angle = angle;
            b.style.transform = `rotate(${angle}deg) translateY(-${ARC_RADIUS}px)`;
            vContainer.appendChild(b); vBars.push(b);
        }

        const connectedStreams = new Set();

        // பட்டன் இன்றி தானாகத் தொடங்கும் தர்க்கம்
        function bootVisualizer() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 128; analyser.smoothingTimeConstant = 0.4;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const iframe = document.getElementById('vdo-engine');

            // Iframe-ல் இருந்து ஆடியோவை உறிஞ்சும் Polling
            setInterval(() => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                try {
                    const iframeDoc = iframe.contentWindow.document;
                    if (!iframeDoc) return;

                    const mediaElements = iframeDoc.querySelectorAll('video, audio');
                    mediaElements.forEach(el => {
                        const stream = el.srcObject;
                        if (stream && stream.getAudioTracks().length > 0 && !connectedStreams.has(stream.id)) {
                            connectedStreams.add(stream.id);
                            const source = audioCtx.createMediaStreamSource(stream);
                            source.connect(analyser); 
                        }
                    });
                } catch (e) {} 
            }, 1000);

            renderVisualizer();
        }

        // அசல் Visualizer Render Logic (ஒரு புள்ளி மாறாமல்)
        const renderVisualizer = () => {
            if (!analyser) return; 
            requestAnimationFrame(renderVisualizer);
            analyser.getByteFrequencyData(dataArray);
            
            const half = Math.floor(vBars.length / 2); let totalVolume = 0;
            const mappingRatio = Math.floor(analyser.frequencyBinCount / 2) / half; 
            
            vBars.forEach((bar, index) => {
                let dIdx = (index < half) ? Math.floor((half - index) * mappingRatio) : Math.floor((index - half) * mappingRatio);
                if(dIdx >= dataArray.length) dIdx = dataArray.length - 1;
                const val = dataArray[dIdx] || 0;
                bar.style.transform = `rotate(${bar.dataset.angle}deg) translateY(-${ARC_RADIUS}px) scaleY(${1 + (val / 30)})`;
                totalVolume += val; 
            });
            
            const avgVol = totalVolume / vBars.length;
            if (glowDiv) glowDiv.style.opacity = Math.min(0.9, avgVol / 120);
        };

        // Window Load ஆனதும் எந்தக் கிளிக்கும் இன்றி தானாக ஆடியோ விழித்துக்கொள்ளும்
        window.addEventListener('load', () => {
            setTimeout(bootVisualizer, 500); // பிரவுசர் தயாராக 500ms தாமதம்
        });
    </script>
</body>
</html>
