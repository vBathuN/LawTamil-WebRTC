<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>LawTamil Auto-Visualizer</title>
    <style>
        body { background-color: transparent !important; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Chrome பிரவுசர் தடையை உடைக்கும் பட்டன் */
        #start-btn { position: absolute; z-index: 99999; padding: 15px 30px; font-size: 20px; background-color: #ec7063; color: white; border: none; border-radius: 5px; cursor: pointer; box-shadow: 0 0 15px rgba(236, 112, 99, 0.8); font-weight: bold; }
        
        #justice-glow { position: absolute; width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle, rgba(255, 215, 0, 0.9) 0%, rgba(255, 215, 0, 0) 50%), radial-gradient(circle, rgba(255, 215, 0, 0.6) 10%, rgba(255, 215, 0, 0) 80%); clip-path: circle(50% at 50% 50%); filter: blur(3px); box-shadow: 0 0 25px rgba(255, 215, 0, 0.8); opacity: 0; transition: opacity 0.05s ease-out, transform 0.05s ease-out; }
        #visualizer-ring { position: absolute; width: 150px; height: 150px; }
        .v-bar { position: absolute; bottom: 50%; left: 50%; width: 4px; height: 6px; background: #ffbc59; border-radius: 2px 2px 0 0; margin-left: -2px; transform-origin: bottom center; box-shadow: 0px 0px 8px rgba(255, 188, 89, 0.9); will-change: height; }
        
        /* VDO.Ninja எஞ்சினை மறைக்கும் குகை */
        #vdo-engine { position: absolute; width: 10px; height: 10px; opacity: 0.01; pointer-events: none; z-index: -1; }
    </style>
</head>
<body>

    <button id="start-btn">▶ CLICK TO START VISUALIZER</button>

    <div id="justice-glow"></div>
    <div id="visualizer-ring"></div>
    
    <iframe id="vdo-engine" allow="autoplay; microphone; camera"></iframe>

    <script>
        // URL-ல் இருந்து Room பெயரைக் கண்டுபிடித்தல் (இல்லையென்றால் JurisprudenceTamil)
        const urlParams = new URLSearchParams(window.location.search);
        const roomName = urlParams.get('room') || 'JurisprudenceTamil';

        // இதுதான் சரியான URL. &scene மற்றும் &autostart கட்டாயம் தேவை!
        document.getElementById('vdo-engine').src = `./index.html?scene&room=${roomName}&autostart`;

        const NUM_BARS = 36;
        const bars = [];
        const visualizerRing = document.getElementById('visualizer-ring');
        const justiceGlow = document.getElementById('justice-glow');
        const startBtn = document.getElementById('start-btn');

        // கட்டங்களை உருவாக்குதல்
        for (let i = 0; i < NUM_BARS; i++) {
            const bar = document.createElement('div');
            bar.className = 'v-bar';
            bar.style.transform = `rotate(${i * (360 / NUM_BARS)}deg) translateY(-45px)`;
            visualizerRing.appendChild(bar);
            bars.push(bar);
        }

        let audioCtx, analyser;
        const connectedStreams = new Set();

        // விசுவலைசரைத் தொடங்கும் முதன்மை ஃபங்ஷன்
        function bootVisualizer() {
            startBtn.style.display = 'none'; // பட்டனை மறைத்துவிடு

            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 128;
            }
            
            // பிரவுசரின் ஆடியோ தடையை உடைத்தல்
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const iframe = document.getElementById('vdo-engine');

            // Iframe-க்குள் ஆடியோ வந்துவிட்டதா எனத் தேடும் லாஜிக் (Polling)
            setInterval(() => {
                try {
                    const iframeDoc = iframe.contentWindow.document;
                    if (!iframeDoc) return;

                    // Scene மோடில் உருவாகும் வீடியோ/ஆடியோ டேக்குகளைக் குறிவைத்தல்
                    const mediaElements = iframeDoc.querySelectorAll('video, audio');
                    
                    mediaElements.forEach(el => {
                        const stream = el.srcObject;
                        if (stream && stream.getAudioTracks().length > 0 && !connectedStreams.has(stream.id)) {
                            connectedStreams.add(stream.id);
                            console.log("LawTamil Engine: Stream Hooked ->", stream.id);
                            
                            const source = audioCtx.createMediaStreamSource(stream);
                            source.connect(analyser); 
                        }
                    });
                } catch (e) {} // CORS பிழைகளைப் புறக்கணிக்க
            }, 1000);

            startAnimation();
        }

        // ஒலியின் அதிர்வுக்கு ஏற்ப வரையும் லாஜிக்
        function startAnimation() {
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            function render() {
                requestAnimationFrame(render);
                if(audioCtx.state === 'suspended') return;

                analyser.getByteFrequencyData(dataArray);
                let totalVolume = 0;

                for (let i = 0; i < NUM_BARS; i++) {
                    const value = dataArray[i];
                    totalVolume += value;
                    bars[i].style.height = Math.max(6, value * 0.4) + 'px';
                }

                const avgVolume = totalVolume / NUM_BARS;
                if (avgVolume > 5) {
                    justiceGlow.style.opacity = Math.min(1, (avgVolume / 100) + 0.3);
                    justiceGlow.style.transform = `translate(-50%, -50%) scale(${1 + (avgVolume / 300)})`;
                } else {
                    justiceGlow.style.opacity = 0;
                    justiceGlow.style.transform = `translate(-50%, -50%) scale(1)`;
                }
            }
            render();
        }

        // 1. குரோமில் டெஸ்ட் செய்ய பட்டன் கிளிக் தேவை
        startBtn.addEventListener('click', bootVisualizer);

        // 2. OBS-க்குள் சென்றால் பட்டன் தேவையில்லை, தானாகவே தொடங்கும்
        if (window.obsstudio !== undefined) {
            bootVisualizer();
        }
    </script>
</body>
</html>
