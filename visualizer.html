<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>LawTamil Justice Glow Visualizer</title>
    <style>
        /* 1. 100% சுத்தமான விசுவலைசர் UI (எந்த குப்பைகளும் இல்லை) */
        body {
            background-color: transparent !important; /* OBS-ல் இணையும் போது பின்னணி தெரியாமல் இருக்க */
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* உங்களின் அசல் Justice Glow வடிவமைப்பு */
        #justice-glow {
            position: absolute; width: 60px; height: 60px; border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.9) 0%, rgba(255, 215, 0, 0) 50%), radial-gradient(circle, rgba(255, 215, 0, 0.6) 10%, rgba(255, 215, 0, 0) 80%);
            clip-path: circle(50% at 50% 50%); filter: blur(3px); box-shadow: 0 0 25px rgba(255, 215, 0, 0.8);
            opacity: 0; transition: opacity 0.05s ease-out, transform 0.05s ease-out;
        }

        #visualizer-ring { position: absolute; width: 150px; height: 150px; }
        
        .v-bar {
            position: absolute; bottom: 50%; left: 50%; width: 4px; height: 6px;
            background: #ffbc59; border-radius: 2px 2px 0 0; margin-left: -2px;
            transform-origin: bottom center; box-shadow: 0px 0px 8px rgba(255, 188, 89, 0.9);
            will-change: height;
        }

        /* 2. WebRTC எஞ்சினை மறைத்து வைக்கும் குகை */
        #vdo-engine {
            position: absolute; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; z-index: -1;
        }
    </style>
</head>
<body>
    
    <div id="justice-glow"></div>
    <div id="visualizer-ring"></div>

    <iframe id="vdo-engine" allow="autoplay; microphone; camera"></iframe>

    <script>
        // 1. URL-ல் இருந்து Room பெயரைக் கண்டுபிடித்தல் (உதாரணம்: ?room=JurisprudenceTamil)
        const urlParams = new URLSearchParams(window.location.search);
        const roomName = urlParams.get('room') || 'JurisprudenceTamil';

        // 2. VDO.Ninja-வை எஞ்சினாக இயக்குதல்
        const iframe = document.getElementById('vdo-engine');
        // குறிப்பு: உங்களின் குளோன் செய்யப்பட்ட சர்வரில் உள்ள அசல் index.html-ஐ இது குறிவைக்கிறது
        iframe.src = `./index.html?room=${roomName}&autostart`; 

        // 3. விசுவலைசர் DOM செட்டப்
        const NUM_BARS = 36;
        const bars = [];
        const visualizerRing = document.getElementById('visualizer-ring');
        const justiceGlow = document.getElementById('justice-glow');

        for (let i = 0; i < NUM_BARS; i++) {
            const bar = document.createElement('div');
            bar.className = 'v-bar';
            bar.style.transform = `rotate(${i * (360 / NUM_BARS)}deg) translateY(-45px)`;
            visualizerRing.appendChild(bar);
            bars.push(bar);
        }

        let audioCtx = null;
        let analyser = null;
        let isAnimating = false;
        const connectedStreams = new Set();

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 128;
            }
            if(audioCtx.state === 'suspended') audioCtx.resume();
        }

        // 4. மாஸ்டர் ஸ்ட்ரோக்: எஞ்சினுக்குள் ஊடுருவி ஆடியோவை உறிஞ்சும் தர்க்கம்
        iframe.onload = () => {
            try {
                const iframeWindow = iframe.contentWindow;
                const originalSet = iframeWindow.Object.getOwnPropertyDescriptor(iframeWindow.HTMLMediaElement.prototype, 'srcObject');
                
                iframeWindow.Object.defineProperty(iframeWindow.HTMLMediaElement.prototype, 'srcObject', {
                    set: function(stream) {
                        if (stream && stream.getAudioTracks().length > 0 && !connectedStreams.has(stream.id)) {
                            connectedStreams.add(stream.id);
                            console.log("LawTamil Bypass: Audio Stream Extracted from Engine!");
                            
                            initAudio();
                            const source = audioCtx.createMediaStreamSource(stream);
                            source.connect(analyser); 
                            
                            if (!isAnimating) {
                                isAnimating = true;
                                startAnimation();
                            }
                        }
                        return originalSet.set.call(this, stream);
                    }
                });
            } catch(e) {
                console.error("Iframe Injection Failed! Make sure visualizer.html is on the same domain.", e);
            }
        };

        // 5. ஒலியின் அதிர்வுக்கு ஏற்ப ஆடும் தர்க்கம்
        function startAnimation() {
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            function render() {
                requestAnimationFrame(render);
                if(!audioCtx || audioCtx.state === 'suspended') return;

                analyser.getByteFrequencyData(dataArray);
                let totalVolume = 0;

                for (let i = 0; i < NUM_BARS; i++) {
                    const value = dataArray[i];
                    totalVolume += value;
                    bars[i].style.height = Math.max(6, value * 0.4) + 'px';
                }

                const avgVolume = totalVolume / NUM_BARS;
                if (avgVolume > 5) {
                    justiceGlow.style.opacity = Math.min(1, (avgVolume / 100) + 0.3);
                    justiceGlow.style.transform = `translate(-50%, -50%) scale(${1 + (avgVolume / 300)})`;
                } else {
                    justiceGlow.style.opacity = 0;
                    justiceGlow.style.transform = `translate(-50%, -50%) scale(1)`;
                }
            }
            render();
        }

        // ஆடியோ தடையை உடைக்க முரட்டுத்தனமான க்ளிக் ஈவென்ட்
        document.addEventListener('click', initAudio);
    </script>
</body>
</html>
